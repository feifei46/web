<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小韩咪 - 个人名片</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #ffe9f4 0%, #ffe0ea 100%);
    color: #b85c7e;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    max-width: 1000px;
    width: 100%;
    padding: 0 20px;
}

.card {
    background: linear-gradient(145deg, #ffffff 0%, #fff5f8 100%);
    border-radius: 32px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(255, 105, 180, 0.15), 0 8px 20px rgba(0, 0, 0, 0.05);
    border: 1px solid rgba(255, 182, 193, 0.5);
}

.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(145deg, #ffb6c1, #ff9eb0);
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto 24px;
    border: 3px solid #ff85a1;
    box-shadow: 0 8px 16px rgba(255, 105, 180, 0.2);
}

.avatar img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
}

.avatar i {
    font-size: 50px;
    color: #ffffff;
}

.name {
    color: #d46b8e;
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 8px;
    text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.3);
}

.tagline {
    color: #ff85a1;
    font-size: 1.1rem;
    margin-bottom: 24px;
    font-weight: 500;
}

.bio {
    color: #b85c7e;
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 32px;
    font-style: italic;
    background: rgba(255, 200, 215, 0.3);
    padding: 12px 20px;
    border-radius: 50px;
    display: inline-block;
    width: auto;
}

.social-links {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.social-links a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: linear-gradient(145deg, #ffb6c1, #ff9eb0);
    color: #ffffff;
    font-size: 1.5rem;
    text-decoration: none;
    transition: all 0.3s ease;
    box-shadow: 0 5px 10px rgba(255, 105, 180, 0.2);
}

.social-links a:hover {
    transform: translateY(-5px) scale(1.05);
    background: linear-gradient(145deg, #ff85a1, #ff6b8f);
    box-shadow: 0 10px 20px rgba(255, 105, 180, 0.4);
}

.social-links a.xiaohongshu:hover {
    background: linear-gradient(145deg, #ff2442, #e61e3a);
}

.social-links a.email:hover {
    background: linear-gradient(145deg, #ff85a1, #ff6b8f);
}

.footer {
    margin-top: 32px;
    font-size: 0.85rem;
    color: #d4a0b0;
}

@media (max-width: 600px) {
    .card {
        padding: 30px 20px;
    }

    .name {
        font-size: 2rem;
    }

    .tagline {
        font-size: 1rem;
    }

    .avatar {
        width: 100px;
        height: 100px;
    }

    .social-links a {
        width: 45px;
        height: 45px;
        font-size: 1.2rem;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="avatar">
                <div class="avatar">
    <img src="yihan.jpg" alt="小韩咪" width="80" height="auto">
</div>
            </div>
            <h1 class="name">陈忆韩</h1>
            <p class="tagline">猫咪爱好者</p>
            <p class="bio">Do small things with great love.</p>
            <div class="social-links">
                
                <a href="https://www.xiaohongshu.com/user/profile/1059309119" target="_blank" class="xiaohongshu" title="小红书">
                    <i class="fab fa-book"></i>
                </a>
                <a href="mailto:3362088295@qq.com" class="email" title="邮箱">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
            <p class="footer">© 2026 陈忆韩</p>
        </div>
    </div>
</body>
</html>
